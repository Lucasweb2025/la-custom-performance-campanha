<body class="la-app text-white antialiased selection:bg-[#e5a93b]/30">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const LOGO_URL = 'https://i.ibb.co/27cxGcb1/lacustomlogotipo.png';
    const CHAVE_CADASTRO = 'LA2026';
    const GESTOR_EMAILS = (window.GESTOR_EMAILS || []).map((e) => e.toLowerCase().trim());

    function emailEhGestor(email) {
      if (!email) return false;
      return GESTOR_EMAILS.includes(email.toLowerCase().trim());
    }

    async function garantirPerfilGestor(user, data) {
      const email = (user.email || data.email || '').toLowerCase();
      if (!emailEhGestor(email) || data.role === 'gerente') return data;
      await db.collection('users').doc(user.uid).update({ role: 'gerente' });
      return { ...data, role: 'gerente' };
    }

    function Logo({ className = 'h-9' }) {
      const [imgErro, setImgErro] = useState(false);
      if (imgErro) {
        return (
          <div className={`bg-[#e5a93b] text-black font-black px-2.5 py-1 rounded text-base tracking-tighter flex items-center justify-center ${className}`}>
            LA
          </div>
        );
      }
      return (
        <img
          src={LOGO_URL}
          alt="L.A CUSTOM"
          className={`${className} w-auto max-w-[200px] object-contain`}
          onError={() => setImgErro(true)}
        />
      );
    }

    function calcularPontosProdutos(produtoIds) {
      let base = produtoIds.reduce((acc, id) => acc + (PRODUTOS_DB[id]?.pontos || 0), 0);
      let maxMult = 1.0;
      COMBOS_REGRAS.forEach(combo => {
        if (combo.itens.every(item => produtoIds.includes(item)) && combo.multiplicador > maxMult) {
          maxMult = combo.multiplicador;
        }
      });
      return { pontos: Math.round(base * maxMult), maxMult };
    }

    function analisarVendasUsuario(contratos, userId, extraSim = null) {
      const validados = contratos.filter((c) => c.vendedorId === userId && c.status === 'Validado');
      const premiumDistintos = new Set();
      let teveMultiplicador = false;
      validados.forEach((c) => {
        (c.produtoIds || []).forEach((id) => {
          if (PREMIUM_IDS.includes(id)) premiumDistintos.add(id);
        });
        if ((c.multiplicador || 1) > 1) teveMultiplicador = true;
      });
      if (extraSim?.produtoIds?.length) {
        extraSim.produtoIds.forEach((id) => {
          if (PREMIUM_IDS.includes(id)) premiumDistintos.add(id);
        });
        if (extraSim.maxMult > 1) teveMultiplicador = true;
      }
      return { premiumDistintos, teveMultiplicador };
    }

    function calcularTierEfetivo(pontos, contratos, userId, extraSim = null) {
      const { premiumDistintos, teveMultiplicador } = analisarVendasUsuario(contratos, userId, extraSim);
      const pts = Math.round(pontos);
      let tier = 'INICIANTE';
      let aviso = '';

      if (pts >= 220) {
        tier = 'BLACK';
      } else if (pts >= 140) {
        if (premiumDistintos.size >= 2 || teveMultiplicador) tier = 'GOLD';
        else {
          tier = 'SILVER';
          aviso = 'Pontos Gold, mas falta: 2 Premium diferentes ou 1 combo multiplicador validado.';
        }
      } else if (pts >= 80) {
        if (premiumDistintos.size >= 1) tier = 'SILVER';
        else {
          tier = 'BRONZE';
          aviso = 'Pontos Silver, mas falta: mínimo 1 produto Premium em venda validada.';
        }
      } else if (pts >= 40) {
        tier = 'BRONZE';
      }

      return { tier, aviso, premiumCount: premiumDistintos.size, teveMultiplicador };
    }

    function exportarRankingCSV(ranking) {
      const linhas = [
        ['Posicao', 'Consultor', 'Concessionaria', 'Vendas', 'Pontos', 'Tier'].join(';'),
        ...ranking.filter((v) => v.role !== 'gerente').map((v, i) =>
          [i + 1, `"${v.nome}"`, `"${v.concessionaria}"`, v.vendas, v.pontos, v.tier].join(';')
        )
      ];
      const blob = new Blob(['\uFEFF' + linhas.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ranking-la-custom-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    const PRODUTOS_DB = {
      ppf_full: { id: 'ppf_full', nome: 'PPF Full', categoria: 'Premium', pontos: 60, desc: 'Película de proteção integral', tipo: 'premium' },
      crystaline: { id: 'crystaline', nome: 'Crystalline', categoria: 'Premium', pontos: 35, desc: 'Vitrificação cerâmica premium', tipo: 'premium' },
      sas: { id: 'sas', nome: 'SAS 3M', categoria: 'Premium', pontos: 25, desc: 'Sistema antiarranhão', tipo: 'premium' },
      combo_care: { id: 'combo_care', nome: 'Combo Care', categoria: 'Premium', pontos: 30, desc: 'Pacote completo de proteção', tipo: 'premium' },
      parabrisa: { id: 'parabrisa', nome: 'Para-brisa', categoria: 'Estratégico', pontos: 20, desc: 'Película protetora de para-brisa', tipo: 'estrategico' },
      insulfilm: { id: 'insulfilm', nome: 'Insulfilm', categoria: 'Constância', pontos: 8, desc: 'Película solar tradicional', tipo: 'constancia' },
      higienizacao: { id: 'higienizacao', nome: 'Higienização', categoria: 'Constância', pontos: 6, desc: 'Limpeza técnica interna', tipo: 'constancia' },
      polimento: { id: 'polimento', nome: 'Polimento', categoria: 'Constância', pontos: 10, desc: 'Correção de pintura', tipo: 'constancia' }
    };

    const PREMIUM_IDS = Object.keys(PRODUTOS_DB).filter((id) => PRODUTOS_DB[id].tipo === 'premium');

    const COMBOS_REGRAS = [
      { id: 'ouro', nome: 'Combo Ouro L.A', itens: ['combo_care', 'crystaline', 'ppf_full'], multiplicador: 2.0, tag: 'Multiplicador Máximo' },
      { id: 'total', nome: 'Proteção Total', itens: ['ppf_full', 'parabrisa', 'sas'], multiplicador: 1.8, tag: 'Rota Black' },
      { id: 'blindagem', nome: 'Blindagem Premium', itens: ['ppf_full', 'parabrisa'], multiplicador: 1.5, tag: 'Acelerador Gold' }
    ];

    const CONCESSIONARIAS = [
      { id: 'sede', nome: 'L.A CUSTOM SEDE', icon: 'fa-building' },
      { id: 'stuttgart_vo', nome: 'STUTTGART VILA OLIMPIA', icon: 'fa-location-dot' },
      { id: 'stuttgart_hub', nome: 'STUTTGART HUB', icon: 'fa-layer-group' },
      { id: 'lexus', nome: 'LEXUS ALPHAVILLE', icon: 'fa-gem' },
      { id: 'porsche_rj', nome: 'PORSCHE CENTER RJ', icon: 'fa-car-side' },
      { id: 'clodomiro', nome: 'UNIDADE CLODOMIRO', icon: 'fa-map-pin' },
      { id: 'motorsport', nome: 'MOTORSPORT', icon: 'fa-flag-checkered' }
    ];

    function App() {
      const [authMode, setAuthMode] = useState('login');
      const [authLoading, setAuthLoading] = useState(true);
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [currentTab, setCurrentTab] = useState('inicio');
      const [authError, setAuthError] = useState('');
      const [submitting, setSubmitting] = useState(false);

      const [vendedores, setVendedores] = useState([]);
      const [contratos, setContratos] = useState([]);

      const [simuladorSelecionados, setSimuladorSelecionados] = useState([]);
      const [formChassi, setFormChassi] = useState('');
      const [formProdutos, setFormProdutos] = useState([]);

      const [loginEmail, setLoginEmail] = useState('');
      const [loginSenha, setLoginSenha] = useState('');
      const [cadNome, setCadNome] = useState('');
      const [cadEmail, setCadEmail] = useState('');
      const [cadSenha, setCadSenha] = useState('');
      const [cadLoja, setCadLoja] = useState('L.A CUSTOM SEDE');
      const [cadChave, setCadChave] = useState('');
      const [resetEmail, setResetEmail] = useState('');
      const [recusaModal, setRecusaModal] = useState(null);
      const [recusaMotivo, setRecusaMotivo] = useState('');

      const isGerente = currentUser?.role === 'gerente';

      useEffect(() => {
        if (isLoggedIn && !isGerente && currentTab === 'gerente') {
          setCurrentTab('inicio');
        }
      }, [isLoggedIn, isGerente, currentTab]);

      const meusContratos = useMemo(() => {
        if (!currentUser) return [];
        return contratos.filter((c) => c.vendedorId === currentUser.uid);
      }, [contratos, currentUser]);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(async (user) => {
          if (user) {
            try {
              const snap = await db.collection('users').doc(user.uid).get();
              if (snap.exists) {
                let data = snap.data();
                data = await garantirPerfilGestor(user, data);
                setCurrentUser({ uid: user.uid, ...data });
                setIsLoggedIn(true);
              } else {
                await auth.signOut();
                setCurrentUser(null);
                setIsLoggedIn(false);
              }
            } catch (err) {
              console.error(err);
              setAuthError('Erro ao carregar perfil.');
            }
          } else {
            setCurrentUser(null);
            setIsLoggedIn(false);
          }
          setAuthLoading(false);
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!isLoggedIn || !currentUser) return;

        const unsubUsers = db.collection('users').onSnapshot(
          (snap) => {
            const list = snap.docs.map((d) => ({
              id: d.id,
              nome: d.data().nome || 'Consultor',
              concessionaria: d.data().concessionaria || '',
              vendas: d.data().vendas || 0,
              pontos: d.data().pontos || 0,
              role: d.data().role || 'consultor',
              isMe: d.id === currentUser.uid
            }));
            setVendedores(list);
          },
          (err) => console.error('users:', err)
        );

        const unsubContratos = db.collection('contratos').onSnapshot(
          (snap) => {
            const list = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
            list.sort((a, b) => {
              const ta = a.criadoEm?.toMillis?.() || 0;
              const tb = b.criadoEm?.toMillis?.() || 0;
              return tb - ta;
            });
            setContratos(list);
          },
          (err) => console.error('contratos:', err)
        );

        return () => {
          unsubUsers();
          unsubContratos();
        };
      }, [isLoggedIn, currentUser?.uid]);

      const handleToggleFormProduct = (id) => {
        setFormProdutos(prev => prev.includes(id) ? prev.filter(p => p !== id) : [...prev, id]);
      };

      const handleRecuperarSenha = async (e) => {
        e.preventDefault();
        const email = resetEmail.trim() || loginEmail.trim();
        if (!email) return alert('Informe seu e-mail.');
        setAuthError('');
        setSubmitting(true);
        try {
          await auth.sendPasswordResetEmail(email);
          alert('E-mail de recuperação enviado! Verifique a caixa de entrada e o spam.');
          setAuthMode('login');
        } catch (err) {
          setAuthError(err.code === 'auth/user-not-found'
            ? 'E-mail não cadastrado no sistema.'
            : 'Não foi possível enviar o e-mail. Tente novamente.');
        } finally {
          setSubmitting(false);
        }
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError('');
        setSubmitting(true);
        try {
          await auth.signInWithEmailAndPassword(loginEmail.trim(), loginSenha);
        } catch (err) {
          setAuthError(err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password'
            ? 'E-mail ou senha incorretos.'
            : 'Não foi possível entrar. Tente novamente.');
        } finally {
          setSubmitting(false);
        }
      };

      const handleEfetuarCadastro = async (e) => {
        e.preventDefault();
        if (!cadNome) return alert('Por favor, digite o nome completo.');
        if (!cadEmail) return alert('Informe um e-mail válido.');
        if (cadSenha.length < 6) return alert('A senha deve ter pelo menos 6 caracteres.');
        if (cadChave !== CHAVE_CADASTRO) {
          return alert('❌ ACESSO NEGADO: Chave Corporativa incorreta.');
        }
        setAuthError('');
        setSubmitting(true);
        try {
          const cred = await auth.createUserWithEmailAndPassword(cadEmail.trim(), cadSenha);
          const emailNorm = cadEmail.trim().toLowerCase();
          const role = emailEhGestor(emailNorm) ? 'gerente' : 'consultor';
          await db.collection('users').doc(cred.user.uid).set({
            nome: cadNome,
            email: emailNorm,
            concessionaria: cadLoja,
            role,
            pontos: 0,
            vendas: 0,
            criadoEm: FieldValue.serverTimestamp()
          });
          alert(`🎯 Credenciamento aceito! Bem-vindo, ${cadNome}.`);
          setCurrentTab('inicio');
        } catch (err) {
          if (err.code === 'auth/email-already-in-use') {
            setAuthError('Este e-mail já está cadastrado. Faça login.');
          } else {
            setAuthError('Erro no cadastro: ' + (err.message || 'tente novamente'));
          }
        } finally {
          setSubmitting(false);
        }
      };

      const handleSubmeterVenda = async (e) => {
        e.preventDefault();
        if (!currentUser) return;
        if (!formChassi) return alert('Por favor, digite o Chassi ou número do contrato.');
        if (formProdutos.length === 0) return alert('Selecione pelo menos um produto para lançar.');

        const chassiNorm = formChassi.toUpperCase().trim();
        const duplicado = contratos.some(
          (c) => c.chassi === chassiNorm && (c.status === 'Pendente' || c.status === 'Validado')
        );
        if (duplicado) return alert('Este chassi já possui lançamento pendente ou validado.');

        const { pontos, maxMult } = calcularPontosProdutos(formProdutos);
        setSubmitting(true);
        try {
          await db.collection('contratos').add({
            chassi: chassiNorm,
            vendedorId: currentUser.uid,
            vendedorNome: currentUser.nome,
            produtoIds: formProdutos,
            produtos: formProdutos.map((p) => PRODUTOS_DB[p].nome).join(' + '),
            pontos,
            multiplicador: maxMult,
            status: 'Pendente',
            criadoEm: FieldValue.serverTimestamp()
          });
          setFormChassi('');
          setFormProdutos([]);
          alert('Contrato enviado para auditoria do gerente!');
          setCurrentTab('inicio');
        } catch (err) {
          console.error(err);
          alert('Erro ao enviar contrato. Verifique sua conexão.');
        } finally {
          setSubmitting(false);
        }
      };

      const handleAprovarContrato = async (contrato) => {
        if (!isGerente || contrato.status !== 'Pendente') return;
        setSubmitting(true);
        try {
          const batch = db.batch();
          batch.update(db.collection('contratos').doc(contrato.id), {
            status: 'Validado',
            aprovadoEm: FieldValue.serverTimestamp()
          });
          batch.update(db.collection('users').doc(contrato.vendedorId), {
            vendas: FieldValue.increment(1),
            pontos: FieldValue.increment(contrato.pontos)
          });
          await batch.commit();
        } catch (err) {
          console.error(err);
          alert('Erro ao aprovar contrato.');
        } finally {
          setSubmitting(false);
        }
      };

      const handleRecusarContrato = (contrato) => {
        if (!isGerente || contrato.status !== 'Pendente') return;
        setRecusaModal(contrato);
        setRecusaMotivo('');
      };

      const handleConfirmarRecusa = async () => {
        if (!recusaModal) return;
        if (!recusaMotivo.trim()) return alert('Informe o motivo da recusa para o consultor.');
        setSubmitting(true);
        try {
          await db.collection('contratos').doc(recusaModal.id).update({
            status: 'Recusado',
            motivoRecusa: recusaMotivo.trim(),
            recusadoEm: FieldValue.serverTimestamp()
          });
          setRecusaModal(null);
          setRecusaMotivo('');
        } catch (err) {
          console.error(err);
          alert('Erro ao recusar contrato.');
        } finally {
          setSubmitting(false);
        }
      };

      const meusDados = useMemo(() => {
        return vendedores.find((v) => v.isMe) || {
          pontos: currentUser?.pontos || 0,
          vendas: currentUser?.vendas || 0,
          nome: currentUser?.nome || 'Consultor'
        };
      }, [vendedores, currentUser]);

      const dadosCalculados = useMemo(() => {
        let simBase = simuladorSelecionados.reduce((acc, curr) => acc + PRODUTOS_DB[curr].pontos, 0);
        let simMaxMult = 1.0;
        COMBOS_REGRAS.forEach(combo => {
          if (combo.itens.every(item => simuladorSelecionados.includes(item)) && combo.multiplicador > simMaxMult) {
            simMaxMult = combo.multiplicador;
          }
        });
        let simTotalVenda = simBase * simMaxMult;

        let pendentes = 0;
        let vendasValidadas = 0;
        contratos.forEach(c => {
          if (c.status === 'Pendente') pendentes += 1;
          if (c.status === 'Validado') vendasValidadas += 1;
        });

        // ORGANIZAÇÃO COMPLETA DO RANKING OFICIAL UNIFICADO
        const rankingOrdenado = vendedores.map(v => {
          let pontosFinais = v.pontos;
          let vendasFinais = v.vendas;
          const extraSim = v.isMe && simTotalVenda > 0
            ? { produtoIds: simuladorSelecionados, maxMult: simMaxMult }
            : null;
          if (v.isMe) {
            pontosFinais += simTotalVenda;
            if (simTotalVenda > 0) vendasFinais += 1;
          }

          const { tier, aviso } = calcularTierEfetivo(pontosFinais, contratos, v.id, extraSim);

          return { ...v, pontos: Math.round(pontosFinais), vendas: vendasFinais, tier, tierAviso: aviso };
        }).sort((a, b) => b.pontos - a.pontos);

        const lojasAgrupadas = Object.fromEntries(
          CONCESSIONARIAS.map(c => [c.nome, { pontos: 0, vendas: 0, consultores: 0, icon: c.icon }])
        );

        rankingOrdenado.forEach(v => {
          if (lojasAgrupadas[v.concessionaria]) {
            lojasAgrupadas[v.concessionaria].pontos += v.pontos;
            lojasAgrupadas[v.concessionaria].vendas += v.vendas;
            if (v.role !== 'gerente') lojasAgrupadas[v.concessionaria].consultores += 1;
          }
        });

        const totalPontosRede = rankingOrdenado.reduce((acc, v) => acc + v.pontos, 0);
        const totalConsultores = vendedores.filter(v => v.role !== 'gerente').length;

        const dashboardLojas = Object.entries(lojasAgrupadas).map(([nome, dados]) => ({
          nome,
          ...dados,
          participacaoRede: totalPontosRede > 0 ? Math.round((dados.pontos / totalPontosRede) * 100) : 0
        })).sort((a, b) => b.pontos - a.pontos);

        let felipeProjecaoPontos = meusDados.pontos + simTotalVenda;
        const simTierInfo = currentUser
          ? calcularTierEfetivo(felipeProjecaoPontos, contratos, currentUser.uid, {
              produtoIds: simuladorSelecionados,
              maxMult: simMaxMult
            })
          : { tier: 'INICIANTE', aviso: '' };
        let simNivel = simTierInfo.tier;
        let simCor = 'text-zinc-500';
        let simPremios = { bonus: 'R$ 0', comissao: '2,5% / 5,0%', extra: 'Nenhum prêmio ativo.' };
        if (simNivel === 'BLACK') { simCor = 'text-[#38bdf8]'; simPremios = { bonus: 'R$ 700,00 (Acumulado)', comissao: '3,2% / 6,0%', extra: 'Almoço Premium + Placa + Exp. Especial 👑' }; }
        else if (simNivel === 'GOLD') { simCor = 'text-[#e5a93b]'; simPremios = { bonus: 'R$ 700,00 (Acumulado)', comissao: '3,0% / 5,5%', extra: 'Almoço Premium + Reconhecimento 🥇' }; }
        else if (simNivel === 'SILVER') { simCor = 'text-slate-300'; simPremios = { bonus: 'R$ 500,00', comissao: '2,5% / 5,0%', extra: 'Almoço Premium + Reconhecimento 🥈' }; }
        else if (simNivel === 'BRONZE') { simCor = 'text-amber-600'; simPremios = { bonus: 'R$ 200,00', comissao: '2,5% / 5,0%', extra: 'Reconhecimento Interno 🥉' }; }

        return {
          simBase, simMaxMult, simTotalVenda, pendentes, vendasValidadas,
          totalConsultores, totalPontosRede, rankingOrdenado, dashboardLojas,
          simNivel, simCor, simPremios, simTierAviso: simTierInfo.aviso
        };
      }, [simuladorSelecionados, contratos, vendedores, meusDados, currentUser]);

      const handleLogout = async () => {
        await auth.signOut();
        setAuthMode('login');
        setSimuladorSelecionados([]);
        setAuthError('');
      };

      if (authLoading) {
        return (
          <div className="la-auth-page min-h-screen flex items-center justify-center">
            <div className="la-z text-center">
              <div className="text-[#e5a93b] text-2xl mb-3"><i className="fa-solid fa-circle-notch fa-spin"></i></div>
              <p className="text-xs text-[#868c96] uppercase tracking-widest">Conectando ao Firebase...</p>
            </div>
          </div>
        );
      }

      if (!isLoggedIn) {
        if (authMode === 'login') {
          return (
            <div className="la-auth-page min-h-screen flex items-center justify-center p-4">
              <div className="la-z w-full max-w-md">
                <div className="la-glass-card p-8 md:p-10 w-full">
                <div className="flex flex-col items-center mb-6 text-center">
                  <span className="la-tag-pill text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full mb-4">♦ Campanha Premium</span>
                  <Logo className="h-14 mb-4" />
                  <h2 className="text-2xl font-black font-mono tracking-wider uppercase text-la-gradient">L.A CUSTOM</h2>
                  <p className="text-[10px] text-[#868c96] tracking-widest uppercase mt-2">Programa Performance Premium</p>
                </div>
                <form onSubmit={handleLogin} className="space-y-4">
                  {authError && <p className="text-xs text-rose-400 bg-rose-500/10 border border-rose-500/20 p-2 rounded">{authError}</p>}
                  <div>
                    <label className="block text-[10px] font-bold uppercase text-[#868c96] mb-1.5 tracking-wider">E-mail</label>
                    <input type="email" required value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} className="la-input w-full bg-[#08090b] border border-[#1c1f26] rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#e5a93b]" />
                  </div>
                  <div>
                    <label className="block text-[10px] font-bold uppercase text-[#868c96] mb-1.5 tracking-wider">Senha</label>
                    <input type="password" required value={loginSenha} onChange={(e) => setLoginSenha(e.target.value)} className="la-input w-full bg-[#08090b] border border-[#1c1f26] rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#e5a93b]" />
                  </div>
                  <button type="submit" disabled={submitting} className="w-full btn-la-primary uppercase text-xs tracking-wider py-3.5 rounded-lg disabled:opacity-50">
                    {submitting ? 'Entrando...' : 'Entrar no Sistema'}
                  </button>
                  <div className="text-center pt-2 space-y-1">
                    <span onClick={() => { setAuthMode('recuperar'); setResetEmail(loginEmail); setAuthError(''); }} className="block text-xs text-[#868c96] hover:text-[#e5a93b] cursor-pointer underline">
                      Esqueci minha senha
                    </span>
                    <span onClick={() => setAuthMode('cadastro')} className="block text-xs text-[#868c96] hover:text-[#e5a93b] cursor-pointer underline">
                      É um Executivo Novo? Cadastre-se aqui
                    </span>
                  </div>
                </form>
                </div>
              </div>
            </div>
          );
        } else if (authMode === 'recuperar') {
          return (
            <div className="la-auth-page min-h-screen flex items-center justify-center p-4">
              <div className="la-z w-full max-w-md">
                <div className="la-glass-card p-8 md:p-10 w-full">
                  <div className="flex flex-col items-center mb-6 text-center">
                    <Logo className="h-12 mb-3" />
                    <h2 className="text-xl font-bold font-mono tracking-wider uppercase text-la-gradient">Recuperar Senha</h2>
                    <p className="text-[10px] text-[#868c96] tracking-widest uppercase mt-1">Enviaremos um link para seu e-mail</p>
                  </div>
                  <form onSubmit={handleRecuperarSenha} className="space-y-4">
                    {authError && <p className="text-xs text-rose-400 bg-rose-500/10 border border-rose-500/20 p-2 rounded">{authError}</p>}
                    <div>
                      <label className="block text-[10px] font-bold uppercase text-[#868c96] mb-1.5 tracking-wider">E-mail cadastrado</label>
                      <input type="email" required value={resetEmail} onChange={(e) => setResetEmail(e.target.value)} className="la-input w-full bg-[#08090b] border border-[#1c1f26] rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#e5a93b]" />
                    </div>
                    <button type="submit" disabled={submitting} className="w-full btn-la-primary uppercase text-xs tracking-wider py-3.5 rounded-lg disabled:opacity-50">
                      {submitting ? 'Enviando...' : 'Enviar link de recuperação'}
                    </button>
                    <div className="text-center pt-2">
                      <span onClick={() => setAuthMode('login')} className="text-xs text-[#868c96] hover:text-white cursor-pointer underline">
                        Voltar para o login
                      </span>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          );
        } else {
          return (
            <div className="la-auth-page min-h-screen flex items-center justify-center p-4">
              <div className="la-z w-full max-w-md">
                <div className="la-glass-card p-8 md:p-10 w-full animate-fade-in">
                <div className="flex flex-col items-center mb-6 text-center">
                  <Logo className="h-12 mb-3" />
                  <h2 className="text-xl font-bold font-mono tracking-wider uppercase text-la-gradient">Ficha de Cadastro</h2>
                  <p className="text-[10px] text-[#868c96] tracking-widest uppercase mt-1">Validação Interconcessionária</p>
                </div>
                <form onSubmit={handleEfetuarCadastro} className="space-y-4">
                  {authError && <p className="text-xs text-rose-400 bg-rose-500/10 border border-rose-500/20 p-2 rounded">{authError}</p>}
                  <div>
                    <label className="block text-[10px] font-bold uppercase text-[#868c96] mb-1.5 tracking-wider">Nome Completo</label>
                    <input type="text" placeholder="Ex: Lucas Silva" value={cadNome} onChange={(e) => setCadNome(e.target.value)} className="la-input w-full bg-[#08090b] border border-[#1c1f26] rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#e5a93b]" />
                  </div>
                  <div>
                    <label className="block text-[10px] font-bold uppercase text-[#868c96] mb-1.5 tracking-wider">E-mail Corporativo</label>
                    <input type="email" required placeholder="seu.email@empresa.com" value={cadEmail} onChange={(e) => setCadEmail(e.target.value)} className="la-input w-full bg-[#08090b] border border-[#1c1f26] rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#e5a93b]" />
                  </div>
                  <div>
                    <label className="block text-[10px] font-bold uppercase text-[#868c96] mb-1.5 tracking-wider">Senha de Acesso</label>
                    <input type="password" required minLength={6} placeholder="Mínimo 6 caracteres" value={cadSenha} onChange={(e) => setCadSenha(e.target.value)} className="la-input w-full bg-[#08090b] border border-[#1c1f26] rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#e5a93b]" />
                  </div>
                  <div>
                    <label className="block text-[10px] font-bold uppercase text-[#868c96] mb-1.5 tracking-wider">Sua Concessionária</label>
                    <select value={cadLoja} onChange={(e) => setCadLoja(e.target.value)} className="la-input w-full bg-[#08090b] border border-[#1c1f26] rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#e5a93b]">
                      {CONCESSIONARIAS.map(c => (
                        <option key={c.id} value={c.nome}>{c.nome}</option>
                      ))}
                    </select>
                  </div>
                  <div>
                    <label className="block text-[10px] font-bold uppercase text-[#868c96] mb-1.5 tracking-wider text-[#e5a93b]"><i className="fa-solid fa-key mr-1"></i>Chave de Acesso Corporativa</label>
                    <input type="text" placeholder="Chave de Ativação (Ex: LA2026)" value={cadChave} onChange={(e) => setCadChave(e.target.value)} className="la-input w-full bg-[#08090b] border border-[#e5a93b]/40 rounded-lg p-2.5 text-sm font-mono text-[#e5a93b] placeholder-amber-900/40 focus:outline-none focus:border-[#e5a93b]" />
                  </div>
                  <button type="submit" disabled={submitting} className="w-full btn-la-primary uppercase text-xs tracking-wider py-3.5 rounded-lg disabled:opacity-50">
                    {submitting ? 'Cadastrando...' : 'Concluir Credenciamento'}
                  </button>
                  <div className="text-center pt-2">
                    <span onClick={() => setAuthMode('login')} className="text-xs text-[#868c96] hover:text-white cursor-pointer underline">
                      Voltar para o Login padrão
                    </span>
                  </div>
                </form>
                </div>
              </div>
            </div>
          );
        }
      }

      return (
        <div className="la-page-wrap min-h-screen">
        <div className="la-z max-w-6xl mx-auto p-4 md:p-6 animate-fade-in">
          
          {/* HEADER PRINCIPAL COM DESTAQUE DINÂMICO DE ABAS CORRIGIDO */}
          <header className="flex flex-col lg:flex-row justify-between items-center pb-5 border-b border-[#1c1f26]/80 mb-6 gap-4">
            <div className="flex items-center gap-3">
              <Logo className="h-8" />
              <div>
                <h1 className="text-sm font-bold tracking-wider font-mono uppercase">L.A CUSTOM</h1>
                <p className="text-[9px] text-[#868c96] tracking-widest uppercase">PERFORMANCE SUITE</p>
              </div>
            </div>
            
            <nav className="flex la-panel border border-[#1c1f26] p-1 rounded-xl gap-1 text-[11px] font-bold uppercase tracking-wider w-full lg:w-auto overflow-x-auto">
              <button onClick={() => setCurrentTab('inicio')} className={`la-nav-tab px-4 py-2 rounded-lg whitespace-nowrap ${currentTab === 'inicio' ? 'la-nav-active' : 'text-[#868c96]'}`}>
                <i className="fa-solid fa-house mr-1.5"></i>Início Geral
              </button>
              <button onClick={() => setCurrentTab('lojas')} className={`la-nav-tab px-4 py-2 rounded-lg whitespace-nowrap ${currentTab === 'lojas' ? 'la-nav-active' : 'text-[#868c96]'}`}>
                <i className="fa-solid fa-layer-group mr-1.5"></i>Concessionárias
              </button>
              <button onClick={() => setCurrentTab('lancar')} className={`la-nav-tab px-4 py-2 rounded-lg whitespace-nowrap ${currentTab === 'lancar' ? 'la-nav-active' : 'text-[#868c96]'}`}>
                <i className="fa-solid fa-square-plus mr-1.5"></i>Lançar Venda
              </button>
              <button onClick={() => setCurrentTab('historico')} className={`la-nav-tab px-4 py-2 rounded-lg whitespace-nowrap ${currentTab === 'historico' ? 'la-nav-active' : 'text-[#868c96]'}`}>
                <i className="fa-solid fa-clock-rotate-left mr-1.5"></i>Minhas Vendas
              </button>
              {isGerente && (
                <button onClick={() => setCurrentTab('gerente')} className={`la-nav-tab px-4 py-2 rounded-lg flex items-center gap-1.5 whitespace-nowrap ${currentTab === 'gerente' ? 'la-nav-active' : 'text-[#868c96]'}`}>
                  <i className="fa-solid fa-user-gear"></i>Painel do Gerente
                  {dadosCalculados.pendentes > 0 && <span className="bg-rose-500 text-white font-sans text-[9px] px-1.5 py-0.5 rounded-full animate-pulse">{dadosCalculados.pendentes}</span>}
                </button>
              )}
            </nav>

            <div className="flex items-center gap-3 self-end lg:self-center">
              <div className="text-right hidden sm:block">
                <p className="text-xs font-bold text-white">{currentUser?.nome}</p>
                <p className="text-[9px] text-[#868c96] uppercase">{isGerente ? 'Gerente Geral' : currentUser?.concessionaria}</p>
              </div>
              <button 
                onClick={handleLogout}
                className="text-xs text-rose-400 hover:text-rose-500 font-bold flex items-center gap-1 bg-rose-500/5 border border-rose-500/10 px-3 py-1.5 rounded transition-all hover:bg-rose-500/10 active:scale-95"
              >
                <i className="fa-solid fa-right-from-bracket"></i> Sair
              </button>
            </div>
          </header>

          {/* TELA 1: INÍCIO GERAL COMPLETA */}
          {currentTab === 'inicio' && (
            <div className="space-y-6">
              <section className="la-panel border border-[#1c1f26] p-6 rounded-xl">
                <div className="text-[10px] uppercase tracking-widest text-[#e5a93b] font-bold flex items-center gap-1.5 mb-1"><span>♦</span> CAMPANHA PREMIUM</div>
                <h2 className="text-3xl font-black font-mono uppercase"><span className="text-white">PROGRAMA </span><span className="text-la-gradient">PERFORMANCE PREMIUM</span></h2>
                <p className="text-[#868c96] text-xs max-w-2xl mt-2 leading-relaxed">Direcionamento estratégico para alta rentabilidade. Use o simulador tátil abaixo e veja a reordenação instantânea do Leaderboard.</p>
              </section>

              {/* CARDS KPI DA CAMPANHA (dados reais do Firebase) */}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div className="la-panel border border-[#1c1f26] p-4 rounded-xl">
                  <span className="text-[9px] text-[#868c96] uppercase font-bold tracking-wider">Consultores Ativos</span>
                  <h4 className="text-xl font-black font-mono text-emerald-400 mt-0.5">{dadosCalculados.totalConsultores}</h4>
                </div>
                <div className="la-panel border border-[#1c1f26] p-4 rounded-xl">
                  <span className="text-[9px] text-[#868c96] uppercase font-bold tracking-wider">Pontuação Total da Rede</span>
                  <h4 className="text-xl font-black font-mono text-[#38bdf8] mt-0.5">{dadosCalculados.totalPontosRede.toLocaleString('pt-BR')} <span className="text-xs font-normal font-sans text-zinc-500">pts</span></h4>
                </div>
                <div className="la-panel border border-[#1c1f26] p-4 rounded-xl">
                  <span className="text-[9px] text-[#868c96] uppercase font-bold tracking-wider">Aprovações Pendentes</span>
                  <h4 className={`text-xl font-black font-mono mt-0.5 ${dadosCalculados.pendentes > 0 ? 'text-[#e5a93b]' : 'text-zinc-500'}`}>
                    {dadosCalculados.pendentes} na fila
                  </h4>
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div className="la-panel border border-[#1c1f26] p-4 rounded-xl">
                  <span className="text-[9px] text-[#868c96] uppercase font-bold tracking-wider">Vendas Validadas (campanha)</span>
                  <h4 className="text-lg font-black font-mono text-white mt-0.5">{dadosCalculados.vendasValidadas}</h4>
                </div>
                <div className="la-panel border border-[#1c1f26] p-4 rounded-xl">
                  <span className="text-[9px] text-[#868c96] uppercase font-bold tracking-wider">Unidades na disputa</span>
                  <h4 className="text-lg font-black font-mono text-[#e5a93b] mt-0.5">{CONCESSIONARIAS.length}</h4>
                </div>
              </div>

              {/* RÉGUA DE BENEFÍCIOS DOS TIERS */}
              <section className="la-panel border border-[#1c1f26] p-5 rounded-xl">
                <h4 className="text-xs font-black uppercase font-mono text-[#e5a93b] mb-4 tracking-wider"><i className="fa-solid fa-stairs mr-1.5"></i>Regras e Benefícios dos Tiers</h4>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 text-xs">
                  <div className="p-4 bg-zinc-900/40 border border-zinc-800/80 rounded flex flex-col justify-between">
                    <div>
                      <div className="font-bold text-amber-600 font-mono text-sm flex justify-between"><span>🥉 BRONZE</span> <span>40 PTS</span></div>
                      <p className="text-[10px] text-zinc-400 mt-1.5 font-medium">🎁 Bônus de R$ 200,00 + Reconhecimento interno.</p>
                    </div>
                    <div className="text-[9px] text-zinc-500 mt-3 border-t border-white/5 pt-2">🎯 Meta: Constância ativa</div>
                  </div>
                  <div className="p-4 bg-zinc-900/40 border border-zinc-800/80 rounded flex flex-col justify-between">
                    <div>
                      <div className="font-bold text-slate-300 font-mono text-sm flex justify-between"><span>🥈 SILVER</span> <span>80 PTS</span></div>
                      <p className="text-[10px] text-zinc-400 mt-1.5 font-medium">🎁 Bônus de R$ 500,00 + Almoço Premium + Reconhecimento interno.</p>
                    </div>
                    <div className="text-[9px] text-[#e5a93b] mt-3 border-t border-white/5 pt-2 font-semibold">📌 Regra: Mínimo 1 item Premium</div>
                  </div>
                  <div className="p-4 bg-yellow-950/5 border border-[#e5a93b]/30 rounded flex flex-col justify-between">
                    <div>
                      <div className="font-bold text-[#e5a93b] font-mono text-sm flex justify-between"><span>🥇 GOLD</span> <span>140 PTS</span></div>
                      <p className="text-[10px] text-zinc-300 mt-1.5 font-medium">🎁 Mantém Bronze+Silver. Novos sobe para <strong className="text-white">3%</strong> | Seminovos sobe para <strong className="text-white">5,5%</strong>.</p>
                    </div>
                    <div className="text-[9px] text-[#e5a93b] mt-3 border-t border-white/5 pt-2 font-semibold">📌 Regra: 2 Premium dif. ou 1 Multiplicador</div>
                  </div>
                  <div className="p-4 bg-sky-950/5 border border-[#38bdf8]/30 rounded flex flex-col justify-between">
                    <div>
                      <div className="font-bold text-[#38bdf8] font-mono text-sm flex justify-between"><span>💎 BLACK</span> <span>220 PTS</span></div>

          )}

          {recusaModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
              <div className="la-glass-card la-z w-full max-w-md p-6">
                <h3 className="text-lg font-bold text-white uppercase font-mono">Motivo da recusa</h3>
                <p className="text-xs text-[#868c96] mt-1 mb-4">Chassi: <span className="font-mono text-zinc-300">{recusaModal.chassi}</span> — {recusaModal.vendedorNome}</p>
                <textarea
                  value={recusaMotivo}
                  onChange={(e) => setRecusaMotivo(e.target.value)}
                  placeholder="Ex: Chassi divergente, produtos não conferem com o contrato..."
                  rows={4}
                  className="la-input w-full bg-[#08090b] border border-[#1c1f26] rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#e5a93b] resize-none"
                />
                <div className="flex gap-2 mt-4">
                  <button type="button" onClick={() => setRecusaModal(null)} className="flex-1 btn-la-ghost text-xs font-bold uppercase py-2.5 rounded-lg">Cancelar</button>
                  <button type="button" disabled={submitting} onClick={handleConfirmarRecusa} className="flex-1 btn-la-primary text-xs font-bold uppercase py-2.5 rounded-lg disabled:opacity-50">Confirmar recusa</button>
                </div>
              </div>
            </div>
          )}

        </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
